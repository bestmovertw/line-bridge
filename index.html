<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在啟動 LINE</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .container { text-align: center; padding: 0 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00b900; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="loader"></div>
        <p>正在為您開啟 LINE App...</p>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2009064962-w2XqDG82",
            N8N_URL: "https://n8n.parzival0626.com/webhook/88164885-9c6f-4956-9b61-593146ec099f",
            LINE_OA_ID: "@138lkhjv"
        };

        const ua = navigator.userAgent;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

        // 【優化】使用 keepalive，確保頁面跳轉時資料傳輸不被中斷
        function send(data) {
            fetch(CONFIG.N8N_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
                keepalive: true 
            }).catch(() => {});
        }

        async function main() {
            if (window.location.hash === "#done") return;

            const params = new URLSearchParams(window.location.search);
            const gclid = params.get('gclid') || "";

            let payload = {
                source: "Liff_Entry",
                gclid: gclid,
                lineUserId: "",
                lineName: ""
            };

            // --- 邏輯 1：電腦版 (維持 QR Code 顯示) ---
            if (!isMobile) {
                payload.source = "PC_QR_Bridge";
                send(payload);

                const currentUrl = window.location.href;
                const qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}`;

                document.getElementById('main-container').innerHTML = `
                    <img src="${qrImgSrc}" alt="Scan Me" style="max-width:250px; margin-bottom:20px;">
                    <p>請掃描 QR Code</p><p>使用手機 LINE 完成預約</p>
                `;
                return;
            }

            // --- 邏輯 2：手機版 (極速直接跳轉) ---
            try {
                await liff.init({ liffId: CONFIG.LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                
                const profile = await liff.getProfile();
                payload.lineUserId = profile.userId;
                payload.lineName = profile.displayName;
                payload.source = "Mobile_Direct_Jump";
                
                // [關鍵] 發送資料不等待，立刻執行下一行跳轉
                send(payload); 

                window.location.hash = "done";
                
                // 使用強效協議直接喚起 App 頁面
                const targetUrl = `https://line.me/R/ti/p/${CONFIG.LINE_OA_ID}?gclid=${gclid}`;
                window.location.replace(targetUrl);

            } catch (e) {
                window.location.replace(`https://line.me/R/ti/p/${CONFIG.LINE_OA_ID}?gclid=${gclid}`);
            }
        }

        main();
    </script>
</body>
</html>
