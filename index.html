<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在開啟預約系統...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .container { text-align: center; padding: 0 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00b900; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; font-weight: bold; }
        .call-btn { margin-top: 15px; display: inline-block; padding: 10px 20px; font-size: 18px; font-weight: bold; color: #ffffff; background-color: #00b900; text-decoration: none; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader"></div>
        <p id="status-text">正在同步預約資訊，請稍候...</p>
        <p>若無法加入，請直接打給阿哲 0912 04 03 09</p>
        <a href="tel:+886912040309" class="call-btn">☎️打給阿哲經理</a>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2009064962-w2XqDG82",
            N8N_URL: "https://n8n.parzival0626.com/webhook/88164885-9c6f-4956-9b61-593146ec099f",
            MOBILE_OA_ID: "@138lkhjv",
            PC_OA_ID: "@138lkhjv"
        };

        function send(data) {
            const formData = new URLSearchParams();
            for (const key in data) { formData.append(key, data[key]); }
            if (navigator.sendBeacon) {
                navigator.sendBeacon(CONFIG.N8N_URL, formData);
            } else {
                fetch(CONFIG.N8N_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            }
        }

        async function main() {
            if (window.location.hash === "#done") return;

            const params = new URLSearchParams(window.location.search);
            const gclid = params.get('gclid') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isLine = ua.indexOf('line') > -1;
            const isMobile = /iphone|ipad|ipod|android/.test(ua);

            // --- 優化：IP 抓取加入 1.5 秒超時限制 ---
            let userIP = "unknown";
            try {
                // 讓 fetch 與 1500 毫秒的計時器賽跑
                const ipResponse = await Promise.race([
                    fetch('https://api.ipify.org?format=json'),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('ip_timeout')), 1500))
                ]);
                const ipData = await ipResponse.json();
                userIP = ipData.ip;
            } catch (e) {
                console.warn("IP fetch timeout or failed, proceeding with unknown.");
            }

            let payload = {
                gclid: gclid,
                user_ip: userIP,
                source: isLine ? "Inside_Line" : (isMobile ? "Mobile_External" : "PC_Entry"),
                timestamp: new Date().toISOString(),
                lineUserId: "",
                lineName: ""
            };

            // --- 分流邏輯 1：電腦版使用者 ---
            if (!isMobile) {
                send(payload);
                window.location.hash = "done";
                setTimeout(() => {
                    window.location.replace(`https://line.me/R/ti/p/${CONFIG.PC_OA_ID}?gclid=${gclid}`);
                }, 500);
                return;
            }

            // --- 分流邏輯 2：手機端且在 LINE 內部 ---
            if (isLine) {
                try {
                    // --- 優化：核心 LIFF 作業加入 2 秒超時限制 ---
                    await Promise.race([
                        (async () => {
                            await liff.init({ liffId: CONFIG.LIFF_ID });
                            if (!liff.isLoggedIn()) {
                                liff.login({ redirectUri: window.location.href });
                                await new Promise(() => {}); // 登入跳轉中，暫停執行後續代碼
                            }
                            const profile = await liff.getProfile();
                            payload.lineUserId = profile.userId;
                            payload.lineName = profile.displayName;
                            payload.source = "Mobile_Success_UID";
                            
                            send(payload);
                            window.location.hash = "done";
                            setTimeout(() => {
                                window.location.replace(`https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}`);
                            }, 500);
                        })(),
                        // 2000 毫秒的定時炸彈，時間到就報錯強制中斷
                        new Promise((_, reject) => setTimeout(() => reject(new Error('liff_timeout')), 2000))
                    ]);
                } catch (e) {
                    console.warn("LIFF logic timed out or failed. Bypassing.", e);
                    // 萬一卡住，標記超時狀態並將收集到的殘餘資料(如GCLID/IP)發送出去
                    payload.source = (e.message === 'liff_timeout') ? "Mobile_LIFF_Timeout_Bypass" : "Mobile_LIFF_Error_Bypass";
                    send(payload);
                    window.location.hash = "done";
                    // 強制放行，確保客人順利進入官方帳號
                    setTimeout(() => {
                        window.location.replace(`https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}`);
                    }, 200);
                }
                return;
            }

            // --- 分流邏輯 3：手機外部瀏覽器 (Safari/Chrome) ---
            send(payload);
            window.location.hash = "done";
            setTimeout(() => {
                window.location.replace(`https://liff.line.me/${CONFIG.LIFF_ID}?gclid=${gclid}`);
            }, 800);
        }

        main();
    </script>
</body>
</html>
