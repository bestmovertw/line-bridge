<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在導向至 LINE</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .container { text-align: center; padding: 0 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00b900; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>正在為您導向至 LINE...</p>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2009064962-w2XqDG82",
            N8N_URL: "https://n8n.parzival0626.com/webhook/88164885-9c6f-4956-9b61-593146ec099f",
            LINE_OA_ID: "@138lkhjv",
            MOBILE_OA_ID: "@138lkhjv", // 手機版 OA
            PC_OA_ID: "@319tksuv"      // 電腦版專屬 OA
        };

        const ua = navigator.userAgent;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
        const isLine = /Line/i.test(ua);

        function send(data) {
            fetch(CONFIG.N8N_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).catch(console.error);
        }

        async function main() {
            // --- 防循環機制：保持不動 ---
            if (window.location.hash === "#done") return;

            const params = new URLSearchParams(window.location.search);
            const gclid = params.get('gclid') || "";

            let payload = {
                source: "Liff_Entry",
                gclid: gclid, // [修正] 確保 GCLID 進入 payload
                lineUserId: "",
                lineName: ""
            };

            // --- 分流邏輯 1：電腦版使用者 (處理 GCLID 並發送至 n8n) ---
            if (!isMobile) {
                payload.source = "PC_Bridge_Scan";
                send(payload); // 這裡會將 gclid 傳給 n8n
                window.location.hash = "done";
                
                setTimeout(() => {
                    // 導向專屬 PC 的 LINE OA 並夾帶 GCLID 進行強化學習
                    window.location.replace(`https://line.me/R/ti/p/${CONFIG.PC_OA_ID}?gclid=${gclid}`);
                }, 500);
                return;
            }

            // --- 分流邏輯 2：手機端且在 LINE 內部 (保持原樣，不動作) ---
            if (isLine) {
                try {
                    await liff.init({ liffId: CONFIG.LIFF_ID });
                    
                    if (!liff.isLoggedIn()) {
                        liff.login({ redirectUri: window.location.href });
                        return;
                    }
                    
                    const profile = await liff.getProfile();
                    payload.lineUserId = profile.userId;
                    payload.lineName = profile.displayName;
                    payload.source = "Mobile_Success_UID";
                    send(payload);

                    window.location.hash = "done";
                    setTimeout(() => {
                        // 依照原本邏輯保持雙跳轉（雖然最後一個會生效）
                        window.location.replace("https://line.me/R/ti/p/" + CONFIG.LINE_OA_ID);
                        window.location.replace(`https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}`);
                    }, 500);
                } catch (e) {
                    console.error(e);
                    window.location.replace(`https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}`);
                }
                return;
            }

            // --- 分流邏輯 3：手機外部瀏覽器 (Safari/Chrome) (保持原樣，不動作) ---
            send(payload);
            window.location.hash = "done";
            setTimeout(() => {
                window.location.replace(`https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}`);
            }, 500);
        }

        main();
    </script>
</body>
</html>
