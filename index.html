<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在開啟預約系統...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .container { text-align: center; padding: 0 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00b900; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .line-btn { display: none; padding: 12px 20px; font-size: 18px; font-weight: bold; color: #ffffff; background-color: #00b900; text-decoration: none; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .call-btn { padding: 12px 20px; font-size: 18px; font-weight: bold; color: #333; background-color: #f0f0f0; text-decoration: none; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader"></div>
        <p id="status-text">正在為您開啟 LINE，請稍候...</p>
        
        <div class="btn-group">
            <!-- 隱藏的手動按鈕，若自動跳轉失敗時顯示 -->
            <a id="manual-line-btn" href="#" class="line-btn">點此手動加入 LINE</a>
            <a href="tel:+886912040309" class="call-btn">☎️若無法加入，請打給阿哲</a>
        </div>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2009064962-w2XqDG82",
            N8N_URL: "https://n8n.parzival0626.com/webhook/88164885-9c6f-4956-9b61-593146ec099f",
            MOBILE_OA_ID: "@138lkhjv",
            PC_OA_ID: "@138lkhjv",
            FALLBACK_URL: "https://lin.ee/rWD3vwN" // 加入指定的備用網址
        };

        // 顯示手動加入按鈕的備用機制
        function showManualButton() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').innerText = "若未自動開啟，請點擊下方按鈕：";
            const lineBtn = document.getElementById('manual-line-btn');
            lineBtn.href = CONFIG.FALLBACK_URL; // 直接使用您提供的短網址
            lineBtn.style.display = 'inline-block';
        }

        function send(data) {
            const formData = new URLSearchParams();
            for (const key in data) { formData.append(key, data[key]); }
            if (navigator.sendBeacon) {
                navigator.sendBeacon(CONFIG.N8N_URL, formData);
            } else {
                fetch(CONFIG.N8N_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            }
        }

        async function main() {
            // 改用 sessionStorage 避免 URL #done 造成的返回卡死
            if (sessionStorage.getItem("redirected")) {
                showManualButton();
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const gclid = params.get('gclid') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isLine = ua.indexOf('line') > -1;
            const isMobile = /iphone|ipad|ipod|android/.test(ua);

            let userIP = "unknown";
            try {
                const ipResponse = await Promise.race([
                    fetch('https://api.ipify.org?format=json'),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('ip_timeout')), 1500))
                ]);
                const ipData = await ipResponse.json();
                userIP = ipData.ip;
            } catch (e) {
                console.warn("IP fetch failed.");
            }

            let payload = {
                gclid: gclid,
                user_ip: userIP,
                source: isLine ? "Inside_Line" : (isMobile ? "Mobile_External" : "PC_Entry"),
                timestamp: new Date().toISOString(),
                lineUserId: "",
                lineName: ""
            };

            // 設定第一順位目標跳轉網址（用於帶上 gclid 參數）
            let targetUrl = isMobile ? 
                (isLine ? `https://line.me/R/ti/p/${CONFIG.MOBILE_OA_ID}` : `https://liff.line.me/${CONFIG.LIFF_ID}?gclid=${gclid}`) : 
                `https://line.me/R/ti/p/${CONFIG.PC_OA_ID}?gclid=${gclid}`;

            // 若為 LINE 內部瀏覽器，執行 LIFF 邏輯 (加長超時時間至 8 秒)
            if (isLine) {
                try {
                    await Promise.race([
                        (async () => {
                            await liff.init({ liffId: CONFIG.LIFF_ID });
                            if (!liff.isLoggedIn()) {
                                liff.login({ redirectUri: window.location.href });
                                await new Promise(() => {}); 
                            }
                            const profile = await liff.getProfile();
                            payload.lineUserId = profile.userId;
                            payload.lineName = profile.displayName;
                            payload.source = "Mobile_Success_UID";
                        })(),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('liff_timeout')), 8000))
                    ]);
                } catch (e) {
                    payload.source = (e.message === 'liff_timeout') ? "Mobile_LIFF_Timeout_Bypass" : "Mobile_LIFF_Error_Bypass";
                }
            }

            // 發送資料並記錄跳轉狀態
            send(payload);
            sessionStorage.setItem("redirected", "true");
            
            // 立即顯示備用按鈕，以防 window.location.replace 被瀏覽器阻擋
            showManualButton();

            // 嘗試自動跳轉
            setTimeout(() => {
                window.location.replace(targetUrl);
            }, 300);
        }

        main();
    </script>
</body>
</html>
